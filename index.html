<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ─────────────────────────────────────────── -->
    <title>student.</title>
    <meta name="description" content="Your personal student productivity dashboard" />
    <meta name="application-name" content="student." />
    <meta name="theme-color" content="#10b981" />

    <!-- ── PWA manifest ─────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Favicon ──────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- ── iOS / iPadOS ─────────────────────────────────────────── -->
    <!-- Tells Safari this is a web app (hides browser chrome when added to home screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="student." />

    <!-- Apple touch icons — iOS/iPadOS uses these for the home screen icon -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180x180.png" />

    <!-- iOS Splash screens — shown while app is loading -->
    <!-- iPhone 14 Pro Max -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/apple-splash-1290-2796.png" />
    <!-- iPhone 14 Pro -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/apple-splash-1179-2556.png" />
    <!-- iPhone 13 Pro Max / 12 Pro Max -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/apple-splash-1284-2778.png" />
    <!-- iPhone 13 / 13 Pro / 12 / 12 Pro -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/apple-splash-1170-2532.png" />
    <!-- iPhone XS Max / XR -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/apple-splash-1242-2688.png" />
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/apple-splash-828-1792.png" />
    <!-- iPhone X / XS -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/apple-splash-1125-2436.png" />
    <!-- iPhone 8 Plus / 7 Plus -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/apple-splash-1242-2208.png" />
    <!-- iPhone 8 / 7 / 6 -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/apple-splash-750-1334.png" />
    <!-- iPad Pro 12.9" -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/apple-splash-2048-2732.png" />
    <!-- iPad Pro 11" / iPad Air -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/apple-splash-1668-2388.png" />
    <!-- iPad Air / iPad Mini -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/apple-splash-1536-2048.png" />

    <!-- ── Android / Chrome ──────────────────────────────────────── -->
    <!-- Android uses the manifest.json — nothing extra needed here -->
    <!-- But these help Chrome on desktop too -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Safe area insets (notch / dynamic island) ─────────────── -->
    <style>
      /* Make the app fill the full screen including notch/home indicator */
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
      body {
        /* Extend background colour into the safe area */
        background-color: #030a06;
        /* Prevent overscroll bounce showing white background on iOS */
        overscroll-behavior: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- ── Register service worker ───────────────────────────────── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('[SW] registered', reg.scope))
            .catch(err => console.warn('[SW] failed', err));
        });
      }
    </script>
  </body>
</html>
